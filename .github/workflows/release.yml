name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: BatRadar ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/builder-effective-config.yaml
          body: |
            ## BatRadar ${{ github.ref_name }}

            ### Cài đặt
            Tải file `BatRadar Setup *.exe` và chạy để cài đặt.

            ### Yêu cầu
            - Windows 10/11
            - Claude Code hoặc Codex đã đăng nhập
